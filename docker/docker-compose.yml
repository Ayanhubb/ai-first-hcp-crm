services:
  db:
    image: postgres:16-alpine
    container_name: hcp-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hcp_crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hcp_crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hcp_crm} -d ${POSTGRES_DB:-hcp_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crm-net
    # Dev only — do not publish in production-like profiles
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: hcp-crm-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SEED_DEMO: ${SEED_DEMO:-true}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
      AI_HISTORY_LIMIT: ${AI_HISTORY_LIMIT:-10}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - crm-net
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: hcp-crm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - crm-net

volumes:
  pgdata:
    name: hcp-crm-pgdata

networks:
  crm-net:
    name: hcp-crm-net
    driver: bridge
